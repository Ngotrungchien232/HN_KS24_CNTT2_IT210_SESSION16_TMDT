<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="admin-shell theme-tmdt">
<div th:replace="~{fragments/navigation :: adminNav}"></div>

<div class="container pb-5 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h5 mb-0 text-muted">Sản phẩm</h1>
        <a class="btn btn-tmdt btn-sm" th:href="@{/admin/products/add}">Thêm</a>
    </div>

    <div th:if="${message}" class="tmdt-alert tmdt-alert--success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>

    <div class="table-responsive tmdt-panel overflow-hidden">
        <table class="table mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Tồn</th>
                <th>Danh mục</th>
                <th style="width: 200px;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products.content}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${#numbers.formatDecimal(p.price, 1, 2)}"></td>
                <td th:text="${p.stock}"></td>
                <td class="text-muted" th:text="${p.category != null ? p.category.name : '—'}"></td>
                <td class="table-actions">
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/products/edit/{id}(id=${p.id})}">Sửa</a>
                    <a class="btn btn-outline-danger btn-sm" th:href="@{/admin/products/delete/{id}(id=${p.id})}"
                       onclick="return confirm('Xóa sản phẩm này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="mt-3" th:if="${products.totalPages > 1}">
        <span class="text-muted small me-2">Trang:</span>
        <a class="btn btn-sm btn-outline-tmdt-muted me-1"
           th:each="i: ${#numbers.sequence(0, products.totalPages - 1)}"
           th:href="@{/admin/products(page=${i})}"
           th:text="${i + 1}"></a>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
