<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="admin-shell theme-tmdt">
<div th:replace="~{fragments/navigation :: adminNav}"></div>
    <div class="container pb-5 px-4">
        <div class="row">
            <div class="col-md-6">
                <h1 th:if="${product.id == null}">Thêm Sản phẩm</h1>
                <h1 th:if="${product.id != null}">Sửa Sản phẩm</h1>
                <form th:action="${product.id == null} ? @{/admin/products/add} : @{/admin/products/edit/{id}(id=${product.id})}" method="post" th:object="${product}" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên Sản phẩm</label>
                        <input type="text" class="form-control" th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}" id="name" th:field="*{name}">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                            <p th:each="err : ${#fields.errors('name')}" th:text="${err}"></p>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Giá</label>
                        <input type="number" step="0.01" class="form-control" th:classappend="${#fields.hasErrors('price') ? 'is-invalid' : ''}" id="price" th:field="*{price}">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}">
                            <p th:each="err : ${#fields.errors('price')}" th:text="${err}"></p>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="stock" class="form-label">Tồn kho</label>
                        <input type="number" class="form-control" th:classappend="${#fields.hasErrors('stock') ? 'is-invalid' : ''}" id="stock" th:field="*{stock}">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}">
                            <p th:each="err : ${#fields.errors('stock')}" th:text="${err}"></p>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả</label>
                        <textarea class="form-control" th:classappend="${#fields.hasErrors('description') ? 'is-invalid' : ''}" id="description" th:field="*{description}" rows="4"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                            <p th:each="err : ${#fields.errors('description')}" th:text="${err}"></p>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Danh mục</label>
                        <select class="form-control" th:classappend="${#fields.hasErrors('category') ? 'is-invalid' : ''}" id="category" th:field="*{category}">
                            <option value="">-- Chọn Danh mục --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}">
                            <p th:each="err : ${#fields.errors('category')}" th:text="${err}"></p>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="imageUrl" class="form-label">URL Ảnh</label>
                        <input type="text" class="form-control" id="imageUrl" th:field="*{imageUrl}">
                    </div>
                    <button type="submit" class="btn btn-tmdt">Lưu</button>
                    <a th:href="@{/admin/products}" class="btn btn-outline-tmdt-muted">Quay lại</a>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
