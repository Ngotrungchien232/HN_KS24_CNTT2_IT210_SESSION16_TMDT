<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="admin-shell theme-tmdt">
<div th:replace="~{fragments/navigation :: adminNav}"></div>

<div class="container pb-5 px-4">
    <h1 class="h5 mb-4 text-muted">Tổng quan</h1>

    <div class="card border-0 shadow-none mb-4">
        <div class="card-body py-3">
            <p class="mb-0 text-muted small text-uppercase" style="letter-spacing: 0.06em;">Doanh thu</p>
            <p class="mb-0 fs-4 fw-semibold text-tmdt-accent">
                <span th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}"></span><span class="text-muted fs-6 fw-normal"> đ</span>
            </p>
        </div>
    </div>

    <div class="card border-0 shadow-none">
        <div class="card-header py-3 fw-semibold">Top 5 sản phẩm bán chạy</div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Đã bán</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${topProducts}">
                    <td th:text="${item[0]}"></td>
                    <td th:text="${item[1]}"></td>
                </tr>
                <tr th:if="${topProducts == null || topProducts.isEmpty()}">
                    <td colspan="2" class="text-muted">Chưa có dữ liệu</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
