<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="admin-shell theme-tmdt">
<div th:replace="~{fragments/navigation :: adminNav}"></div>
    <div class="container pb-5 px-4">
        <div class="row">
            <div class="col-md-6">
                <h1 th:if="${category.id == null}">Thêm Danh mục</h1>
                <h1 th:if="${category.id != null}">Sửa Danh mục</h1>
                <form th:action="${category.id == null} ? @{/admin/categories/add} : @{/admin/categories/edit/{id}(id=${category.id})}" method="post" th:object="${category}" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên Danh mục</label>
                        <input type="text" class="form-control" th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}" id="name" th:field="*{name}">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                            <p th:each="err : ${#fields.errors('name')}" th:text="${err}"></p>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả</label>
                        <textarea class="form-control" th:classappend="${#fields.hasErrors('description') ? 'is-invalid' : ''}" id="description" th:field="*{description}" rows="4"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                            <p th:each="err : ${#fields.errors('description')}" th:text="${err}"></p>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-tmdt">Lưu</button>
                    <a th:href="@{/admin/categories}" class="btn btn-outline-tmdt-muted">Quay lại</a>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
