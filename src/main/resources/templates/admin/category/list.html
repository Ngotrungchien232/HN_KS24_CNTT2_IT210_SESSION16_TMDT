<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="admin-shell theme-tmdt">
<div th:replace="~{fragments/navigation :: adminNav}"></div>

<div class="container pb-5 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h5 mb-0 text-muted">Danh mục</h1>
        <a class="btn btn-tmdt btn-sm" th:href="@{/admin/categories/add}">Thêm</a>
    </div>

    <div th:if="${message}" class="tmdt-alert tmdt-alert--success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>
    <div th:if="${error}" class="tmdt-alert tmdt-alert--danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>

    <div class="table-responsive tmdt-panel overflow-hidden">
        <table class="table mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Mô tả</th>
                <th style="width: 200px;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${categories}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.name}"></td>
                <td class="text-muted small" th:text="${c.description}"></td>
                <td class="table-actions">
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/categories/edit/{id}(id=${c.id})}">Sửa</a>
                    <a class="btn btn-outline-danger btn-sm" th:href="@{/admin/categories/delete/{id}(id=${c.id})}"
                       onclick="return confirm('Xóa danh mục này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
