<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="auth-body theme-tmdt">
<div class="auth-card wide">
    <div class="mb-4">
        <h1 class="mb-0">Đăng ký khách hàng</h1>
        <p class="auth-lead mb-0">Tài khoản quản trị do hệ thống cấp, không đăng ký công khai.</p>
    </div>

    <div th:if="${error}" class="tmdt-alert tmdt-alert--danger alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Không thành công.</span> <span th:text="${error}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>
    <div th:if="${message}" class="tmdt-alert tmdt-alert--info alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Thông báo.</span> <span th:text="${message}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>

    <form th:action="@{/auth/register}" method="post" th:object="${user}" novalidate class="mt-3">
        <div class="mb-3">
            <label class="form-label" for="username">Tên đăng nhập</label>
            <input type="text" class="form-control" id="username" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username') ? 'is-invalid' : ''}" placeholder="Tên đăng nhập">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}">
                <span th:each="err : ${#fields.errors('username')}" th:text="${err}"></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Mật khẩu</label>
            <input type="password" class="form-control" id="password" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password') ? 'is-invalid' : ''}" placeholder="Ít nhất 6 ký tự">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}">
                <span th:each="err : ${#fields.errors('password')}" th:text="${err}"></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="fullName">Họ và tên</label>
            <input type="text" class="form-control" id="fullName" th:field="*{fullName}"
                   th:classappend="${#fields.hasErrors('fullName') ? 'is-invalid' : ''}" placeholder="Họ và tên">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}">
                <span th:each="err : ${#fields.errors('fullName')}" th:text="${err}"></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-control" id="email" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email') ? 'is-invalid' : ''}" placeholder="Email">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}">
                <span th:each="err : ${#fields.errors('email')}" th:text="${err}"></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="phone">Số điện thoại <span class="fw-normal opacity-75">(tuỳ chọn)</span></label>
            <input type="tel" class="form-control" id="phone" th:field="*{phone}"
                   th:classappend="${#fields.hasErrors('phone') ? 'is-invalid' : ''}" placeholder="10–11 chữ số">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}">
                <span th:each="err : ${#fields.errors('phone')}" th:text="${err}"></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="address">Địa chỉ</label>
            <input type="text" class="form-control" id="address" th:field="*{address}"
                   th:classappend="${#fields.hasErrors('address') ? 'is-invalid' : ''}" placeholder="Địa chỉ giao hàng">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}">
                <span th:each="err : ${#fields.errors('address')}" th:text="${err}"></span>
            </div>
        </div>
        <button type="submit" class="btn btn-auth-submit">Đăng ký</button>
    </form>

    <div class="auth-footer">
        <p class="mb-2">Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a></p>
        <a th:href="@{/}" class="d-inline-block mt-1">← Về trang chủ</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
