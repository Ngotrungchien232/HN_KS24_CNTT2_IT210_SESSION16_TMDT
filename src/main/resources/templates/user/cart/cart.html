<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="shop-body theme-tmdt">
<div th:replace="~{fragments/navigation :: shopNav}"></div>

<div class="container py-4">
    <h1 class="h4 mb-4">Giỏ hàng</h1>

    <div th:if="${error}" class="tmdt-alert tmdt-alert--danger alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Lưu ý.</span> <span th:text="${error}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>
    <div th:if="${message}" class="tmdt-alert tmdt-alert--success alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Đã xử lý.</span> <span th:text="${message}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>

    <div class="table-responsive tmdt-panel overflow-hidden" th:if="${not #lists.isEmpty(cartItems)}">
        <table class="table mb-0">
            <thead>
            <tr>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${cartItems}">
                <td th:text="${entry.key.name}"></td>
                <td th:text="${#numbers.formatDecimal(entry.key.price, 1, 2)} + ' đ'"></td>
                <td>
                    <form class="d-flex gap-2" th:action="@{/cart/update}" method="post">
                        <input type="hidden" name="id" th:value="${entry.key.id}">
                        <input type="number" name="quantity" th:value="${entry.value}" min="1" class="form-control form-control-sm" style="width: 88px;">
                        <button type="submit" class="btn btn-outline-primary btn-sm">Cập nhật</button>
                    </form>
                </td>
                <td th:text="${#numbers.formatDecimal(entry.key.price * entry.value, 1, 2)} + ' đ'"></td>
                <td><a class="btn btn-outline-danger btn-sm" th:href="@{/cart/remove/{id}(id=${entry.key.id})}">Xóa</a></td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <td colspan="3" class="text-end fw-semibold text-muted">Tổng cộng</td>
                <td colspan="2" class="fw-semibold text-tmdt-accent" th:text="${#numbers.formatDecimal(total, 1, 2)} + ' đ'"></td>
            </tr>
            </tfoot>
        </table>
    </div>

    <p class="text-muted" th:if="${#lists.isEmpty(cartItems)}">Giỏ hàng đang trống.</p>

    <div class="mt-3 d-flex flex-wrap gap-2" th:if="${not #lists.isEmpty(cartItems)}">
        <a class="btn btn-tmdt btn-sm" th:href="@{/checkout}">Thanh toán</a>
        <a class="btn btn-outline-tmdt-muted btn-sm" th:href="@{/products}">Tiếp tục mua</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
