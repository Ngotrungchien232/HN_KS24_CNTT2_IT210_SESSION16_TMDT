<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="shop-body theme-tmdt">
<div th:replace="~{fragments/navigation :: shopNav}"></div>

<div class="hero-tmdt">
    <div class="container py-2">
        <h1 class="h3 fw-semibold mb-2">Cửa hàng trực tuyến</h1>
        <p class="mb-0 text-soft">Một vài sản phẩm gợi ý — xem đầy đủ trong mục Sản phẩm.</p>
    </div>
</div>

<div class="container pb-5">
    <div th:if="${message}" class="tmdt-alert tmdt-alert--success alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Đã xử lý.</span> <span th:text="${message}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>
    <div th:if="${error}" class="tmdt-alert tmdt-alert--danger alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Lưu ý.</span> <span th:text="${error}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h5 mb-0 text-muted">Sản phẩm gợi ý</h2>
        <a class="btn btn-tmdt btn-sm" th:href="@{/products}">Xem tất cả</a>
    </div>

    <div class="row g-4">
        <div class="col-6 col-md-4 col-lg-3" th:each="p : ${products}">
            <div class="card h-100 shadow-none card-product">
                <img th:if="${p.imageUrl != null && !p.imageUrl.isBlank()}"
                     th:src="${p.imageUrl}" class="card-img-top" alt="">
                <div th:unless="${p.imageUrl != null && !p.imageUrl.isBlank()}"
                     class="placeholder-visual d-flex align-items-center justify-content-center">
                    Chưa có ảnh
                </div>
                <div class="card-body d-flex flex-column">
                    <h3 class="card-title h6" th:text="${p.name}">Tên</h3>
                    <p class="small text-muted mb-1" th:if="${p.category != null}" th:text="${p.category.name}">DM</p>
                    <p class="fw-semibold text-tmdt-accent mb-3" th:text="${#numbers.formatDecimal(p.price, 1, 2)} + ' đ'">0 đ</p>
                    <a class="btn btn-outline-primary btn-sm mt-auto" th:href="@{/products/detail/{id}(id=${p.id})}">Chi tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
