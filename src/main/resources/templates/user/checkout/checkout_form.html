<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="shop-body theme-tmdt">
<div th:replace="~{fragments/navigation :: shopNav}"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="tmdt-panel p-4">
                <h1 class="h5 mb-4">Thông tin giao hàng</h1>

                <div class="tmdt-alert tmdt-alert--danger" th:if="${#fields.hasAnyErrors()}">
                    <span class="tmdt-alert__title">Kiểm tra lại.</span>
                    <ul class="mb-0 ps-3 mt-2">
                        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                    </ul>
                </div>

                <form th:action="@{/checkout/place}" method="post" th:object="${shipping}" novalidate class="mt-2">
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Họ và tên</label>
                        <input type="text" class="form-control form-control-sm" id="fullName" th:field="*{fullName}"
                               th:classappend="${#fields.hasErrors('fullName') ? 'is-invalid' : ''}">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}">
                            <span th:each="err : ${#fields.errors('fullName')}" th:text="${err}"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control form-control-sm" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email') ? 'is-invalid' : ''}">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}">
                            <span th:each="err : ${#fields.errors('email')}" th:text="${err}"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Điện thoại</label>
                        <input type="tel" class="form-control form-control-sm" id="phone" th:field="*{phone}"
                               th:classappend="${#fields.hasErrors('phone') ? 'is-invalid' : ''}">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}">
                            <span th:each="err : ${#fields.errors('phone')}" th:text="${err}"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Địa chỉ giao hàng</label>
                        <textarea class="form-control form-control-sm" id="address" rows="3" th:field="*{address}"
                                  th:classappend="${#fields.hasErrors('address') ? 'is-invalid' : ''}"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}">
                            <span th:each="err : ${#fields.errors('address')}" th:text="${err}"></span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-tmdt btn-sm">Đặt hàng</button>
                    <a th:href="@{/cart}" class="btn btn-outline-tmdt-muted btn-sm">Quay lại giỏ</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
