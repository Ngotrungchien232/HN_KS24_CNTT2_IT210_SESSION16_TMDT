<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="shop-body theme-tmdt">
<div th:replace="~{fragments/navigation :: shopNav}"></div>

<div class="container py-4">
    <h1 class="h4 mb-4">Danh sách sản phẩm</h1>

    <form class="row g-2 align-items-end mb-4 p-3 tmdt-panel" method="get" th:action="@{/products}">
        <div class="col-md-3">
            <label class="form-label mb-1">Từ khóa</label>
            <input type="text" name="keyword" class="form-control form-control-sm" placeholder="Tìm..." th:value="${keyword}">
        </div>
        <div class="col-md-3">
            <label class="form-label mb-1">Danh mục</label>
            <select name="categoryId" class="form-select form-select-sm">
                <option value="">Tất cả</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${categoryId == c.id}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label mb-1">Giá từ</label>
            <input type="number" step="0.01" name="minPrice" class="form-control form-control-sm" th:value="${minPrice}">
        </div>
        <div class="col-md-2">
            <label class="form-label mb-1">Đến</label>
            <input type="number" step="0.01" name="maxPrice" class="form-control form-control-sm" th:value="${maxPrice}">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-tmdt btn-sm w-100">Lọc</button>
        </div>
    </form>

    <div class="table-responsive tmdt-panel overflow-hidden">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>Tên</th>
                <th>Giá</th>
                <th>Danh mục</th>
                <th style="width: 220px;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products.content}">
                <td><a class="text-tmdt-accent text-decoration-none" th:href="@{/products/detail/{id}(id=${p.id})}" th:text="${p.name}"></a></td>
                <td th:text="${#numbers.formatDecimal(p.price, 1, 2)} + ' đ'"></td>
                <td class="text-muted" th:text="${p.category != null ? p.category.name : '—'}"></td>
                <td>
                    <form class="d-flex gap-2 align-items-center" th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
                        <input type="number" name="quantity" value="1" min="1" class="form-control form-control-sm" style="width: 72px;">
                        <button type="submit" class="btn btn-primary btn-sm">Thêm giỏ</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="mt-3" th:if="${products.totalPages > 1}">
        <span class="text-muted small me-2">Trang:</span>
        <a class="btn btn-sm btn-outline-tmdt-muted me-1"
           th:each="i: ${#numbers.sequence(0, products.totalPages - 1)}"
           th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           th:text="${i + 1}"></a>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
