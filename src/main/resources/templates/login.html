<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tmdt.css}">
</head>
<body class="auth-body theme-tmdt">
<div class="auth-card">
    <div class="mb-4">
        <h1 class="mb-0">Đăng nhập</h1>
        <p class="auth-lead mb-0">Khách hàng hoặc quản trị — hệ thống chuyển trang theo vai trò sau khi đăng nhập.</p>
    </div>

    <div th:if="${error}" class="tmdt-alert tmdt-alert--danger alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Không thành công.</span> <span th:text="${error}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>
    <div th:if="${message}" class="tmdt-alert tmdt-alert--info alert-dismissible fade show" role="alert">
        <span><span class="tmdt-alert__title">Thông báo.</span> <span th:text="${message}"></span></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
    </div>

    <form th:action="@{/auth/login}" method="post" th:object="${loginForm}" novalidate class="mt-3">
        <div class="mb-3">
            <label class="form-label" for="username">Tên đăng nhập</label>
            <input type="text" class="form-control" id="username" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username') ? 'is-invalid' : ''}"
                   placeholder="Tên đăng nhập" autocomplete="username">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}">
                <span th:each="err : ${#fields.errors('username')}" th:text="${err}"></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Mật khẩu</label>
            <input type="password" class="form-control" id="password" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password') ? 'is-invalid' : ''}"
                   placeholder="Mật khẩu" autocomplete="current-password">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}">
                <span th:each="err : ${#fields.errors('password')}" th:text="${err}"></span>
            </div>
        </div>
        <button type="submit" class="btn btn-auth-submit">Đăng nhập</button>
    </form>

    <div class="auth-footer">
        <p class="mb-2">Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký</a></p>
        <a th:href="@{/}" class="d-inline-block mt-1">← Về trang chủ</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
